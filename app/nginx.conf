server {
    listen 80;
    server_name facilita3d.shop www.facilita3d.shop;

    # Opcional (Redirecionar todo mundo que entra sem cadeado direto pro cadeado)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name facilita3d.shop www.facilita3d.shop;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name facilita3d.shop www.facilita3d.shop;

    ssl_certificate /etc/letsencrypt/live/facilita3d.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/facilita3d.shop/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # O SEGREDO 1: Ensinamos o Nginx a enviar as chamadas da API sob o mesmo cadeado pro backend
    location /api/ {
        # Reescreve a URL tirando o "/api" antes de enviar pro Node
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://erpfacilita-backend:3001;
        # --- ADICIONE ESTAS 4 LINHAS ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
